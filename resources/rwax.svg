<svg width="48" height="48" viewBox="0 0 264 264" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="132" cy="132" r="131" fill="url(#primaryGradient)"/>

  <!-- Inner Circle Frame -->
  <circle cx="132" cy="132" r="99" fill="none" stroke="#FFFFFF" stroke-width="12"/>

  <!-- Main Lettering -->
  <text x="132" y="132" font-family="Verdana, sans-serif" font-size="62" font-weight="bold"
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">RWA</text>

  <!-- Slogan -->
  <text x="132" y="214" font-family="Arial, sans-serif" font-size="14" font-style="italic"
        fill="#E0E0E0" text-anchor="middle">xrpl-ws</text>

  <!-- "x" indicator -->
  <circle cx="191" cy="191" r="33" fill="#6366F1"/>
  <text x="191" y="200" font-family="Arial, sans-serif" font-size="33" font-weight="bold"
        fill="white" text-anchor="middle">x</text>
</svg>
