name: Run linting and tests

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  doc-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Doc Tests
        run: cargo test --doc

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Unit Tests
        run: cargo test --package xrpl-ws --lib -- --nocapture

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    environment: tests
    env:
      TEST_SEED_1: ${{ secrets.TEST_SEED_1 }}
      TEST_SEED_2: ${{ secrets.TEST_SEED_2 }}
      TEST_SEED_3: ${{ secrets.TEST_SEED_3 }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fund Test Accounts
        run: |
          python -m pip install --upgrade pip
          pip install xrpl-py
          python scripts/fund_test_accounts.py
      - name: Run Integration Tests
        run: cargo test --package xrpl-ws --test '*' -- --nocapture
